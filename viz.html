basics|20% corporate rate]]).\n\n## The rule (verify_live)\n\n- **Reduced rate: 15%** (vs the standard 30%). **From 1 July 2026 the reduced rate rises to 18%** , a live reform, confirm the exact figure and date before relying on it. [search]\n- **Waiting period:** dividends from the profit distribution of the **3rd financial year** after the contribution qualify for the low rate; an intermediate **20%** rate applies for the 2nd year. [search]\n\n### Conditions [search]\n\n- The company is a **small company** ([[company-size-criteria]]).\n- Formed **from 1 July 2013**.\n- The shares were issued for a **cash contribution**, fully paid up, and are **not preferential**.\n- The shares are **registered to the original shareholders**.\n\n## Related: liquidation reserve\n\nA separate KMO mechanism: book part of taxed profit to a **liquidation reserve** (10% tax up front), then after a 5-year wait distribute at 5% withholding (15% total), or 0% extra at liquidation. Earlier distribution costs 20%. (See planned `liquidation-reserve`.)\n\n## Why it matters\n\nVVPR-bis vs liquidation reserve vs salary is the core payout-planning decision the accounting agent models for a profitable BV , interacting with [[corporate-tax-basics]] and [[director-remuneration]].\n\n## See also\n\n[[director-remuneration]] \u00b7 [[corporate-tax-basics]] \u00b7 [[company-size-criteria]] \u00b7 [[distribution-test-advies]] (legal gate before any payout)\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn (rate change effective 1 July 2026).", "investment-deduction": "\n# Investment deduction (investeringsaftrek)\n\nA tax incentive: deduct a **percentage of qualifying investments** directly from taxable profit (on top of normal depreciation), lowering corporate tax. From **1 January 2025** the old fragmented system was **reformed into a simpler one with new categories**.\n\n## What qualifies (verify_live)\n\n- **New** tangible or intangible fixed assets, **used in Belgium** for the professional activity, with a depreciation period of **at least 3 years**. [astro]\n- **Excluded:** assets not used 100% professionally; **passenger / dual-use cars** ([[car-and-mobility]]); polluting investments (unless no economically viable carbon-free alternative exists). [astro]\n\n## The 2025 categories\n\nThe reform groups the deduction into a few tiers , a **basic** deduction, a higher **thematic/green** deduction (energy, transport, environment, digital), and a **technology** deduction , each with its own rate. **The exact percentages and category definitions must be confirmed live.** [astro]\n\n> **verify_live.** Confirm the current rates and category conditions with [FOD Financi\u00ebn](https://financien.belgium.be) before applying to a real assessment.\n\n## Why it matters\n\nFor a one-person BV making a real investment (equipment, green assets), this can materially cut the year's [[corporate-tax-basics|corporate tax]] , the agent should check eligibility when booking a fixed asset ([[chart-of-accounts-mar]]).\n\n## See also\n\n[[corporate-tax-basics]] \u00b7 [[car-and-mobility]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "liquidation-reserve": "\n# Liquidation reserve (liquidatiereserve)\n\nA KMO payout-planning mechanism, alternative to a direct [[vvpr-bis-dividends|dividend]]: the company books part of its **taxed profit** to a separate liquidation reserve, paying a small anticipative tax now, in exchange for a low withholding when the reserve is later distributed.\n\n## The mechanism (verify_live)\n\n- Set aside taxed profit + pay **~10% anticipative corporate tax** up front. [search]\n- After a **waiting period**, distribute at a **reduced withholding** (historically 5% after 5 years, i.e. ~15% total); distributing **earlier** costs more (~20%). At **liquidation**, no extra withholding regardless of the wait. [search]\n\n## The 2025 reform (Paasakkoord) , NOT yet final\n\nThe Easter agreement **shortens the waiting period and slightly raises the later rate** , the aim is to let owners pay out sooner at a modestly higher cost. **These measures still need parliamentary approval and may change.** [search]\n\n> **confidence: low + verify_live.** Confirm the current waiting period, the anticipative rate, and the distribution withholding with [FOD Financi\u00ebn](https://financien.belgium.be) or the accountant before acting , the numbers are in flux.\n\n## Why it matters\n\nLiquidation reserve vs [[vvpr-bis-dividends|VVPR-bis]] vs [[director-remuneration|salary]] is the core payout decision for a profitable one-person BV; the 2025 changes shift the trade-off, so the agent must use live figures.\n\n## See also\n\n[[vvpr-bis-dividends]] \u00b7 [[corporate-tax-basics]] \u00b7 [[director-remuneration]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn. Reform pending.", "advance-payments": "\n# Advance payments (voorafbetalingen)\n\nA company is expected to **prepay** its corporate tax during the year in quarterly instalments (VA1-VA4). Prepaying too little triggers a **surcharge** (*belastingvermeerdering*) on the tax due , effectively a penalty for under-prepayment.\n\n## The rule (verify_live)\n\n- **Four quarterly due dates** for a calendar-year company , roughly **10 April, 10 July, 10 October, and 20 December**. A non-calendar financial year shifts these. [fod]\n- **Under-prepayment -> surcharge.** Earlier payments earn a higher credit (bonification logic), so VA1 counts more than VA4. [fod]\n- **The surcharge percentage and the per-quarter credit rates are set each year** by the government , do not assume last year's figures. [fod]\n- **Start-up exemption:** small companies are generally **exempt from the surcharge for their first three financial years**. [fod]\n\n> Confirm the current surcharge rate, the exact due dates, and the start-up exemption with [FOD Financi\u00ebn](https://financien.belgium.be) before planning payments.\n\n## Why it matters\n\nFor a profitable one-person BV past its first three years, planning advance payments is a concrete, recurring agent task: estimate the year's [[corporate-tax-basics|corporate tax]], schedule the instalments to avoid the surcharge, and reconcile against the assessment.\n\n## See also\n\n[[corporate-tax-basics]] \u00b7 [[company-size-criteria]]\n\nSource: distilled from the standard mechanism; verify all figures against FOD Financi\u00ebn.", "company-size-criteria": "\n# Company size criteria (micro / small)\n\nMost management/freelance BVs are **micro** or **small** companies, which unlocks big simplifications (abridged or micro annual-accounts model, fewer disclosures, usually no audit). Size is judged on the company exceeding **no more than one** of the criteria, assessed on a **two-year consistency basis**.\n\n## Thresholds (last-known, verify_live)\n\n- **Micro company** (uses the micro model): exceeds no more than 1 of , avg **10 FTE**, **EUR 900,000** turnover (excl. VAT), **EUR 450,000** balance-sheet total. [grok/nbb]\n- **Small company** (abridged / *verkort* model): exceeds no more than 1 of , avg **50 FTE**, **EUR 11,250,000** turnover, **EUR 6,000,000** balance-sheet total. [grok/nbb]\n- **Larger:** the full model, more disclosures, possible audit.\n\n> Thresholds change (the figures above are for financial years from 01/01/2024). **Confirm the current thresholds with the [NBB Central Balance Sheet Office](https://www.nbb.be/en/central-balance-sheet-office)** before relying on a size classification.\n\n## Why it matters\n\nSize drives the [[annual-accounts-nbb|annual-accounts model]] (planned), the disclosure burden, and audit. A one-person management BV is almost always **micro** , the lightest regime , which is what the accounting agent assumes by default.\n\n## See also\n\n[[eenmanszaak-vs-vennootschap]] \u00b7 [[chart-of-accounts-mar]] \u00b7 [[size-criteria-advies]] (legal source: WVV art. 1:24/1:25)\n\nSource: Grok research synthesis; verify against NBB / CBN / FPS Economy.", "eenmanszaak-vs-vennootschap": "\n# Eenmanszaak vs vennootschap (BV)\n\nThe business form drives the accounting obligations , this is the first fork.\n\n## Eenmanszaak (sole trader, natural person)\n\n- May keep **simplified (single-entry)** bookkeeping below the turnover threshold: a purchases book, a sales book, a financial book.\n- Taxed in **personal income tax** (personenbelasting), progressive rates.\n- No annual accounts to file at the NBB.\n- Fits the polished freelancer SaaS (Accountable, Dexxter); an agent for this case is lighter.\n\n## Vennootschap (company, BV / SRL)\n\n- **Must** keep **double-entry** bookkeeping on the [[chart-of-accounts-mar|MAR/PCMN chart]] , record assets, liabilities, depreciation, reserves, provisions.\n- Taxed in **corporate tax** (vennootschapsbelasting); the director draws remuneration.\n- **Must file annual accounts** at the NBB each year (micro/abbreviated scheme for a small company).\n- This is the KB's target case: the agent must handle real double-entry + statutory filing.\n\n## Why it matters for the agent\n\nThe freelancer tools stop at eenmanszaak simplified accounting; a BV needs double-entry + annual accounts, which is exactly the gap the accounting agent fills. Everything in [[bookkeeping]] and [[year-end]] assumes a **BV** unless tagged `eenmanszaak`.\n\n## See also\n\n[[chart-of-accounts-mar]] \u00b7 [[vat-rates-and-regimes]]", "depreciation-advies": "\n# CBN advies , depreciation (afschrijvingen)\n\nA `references/cbn-adviezen/` page: the CBN/CNC accounting principles for depreciating fixed assets, which ground the practice in [[chart-of-accounts-mar|the books]] and at [[annual-accounts-nbb|year-end]].\n\n## What the advies says\n\n- Fixed assets are depreciated on a **plan set by the governing body** to spread the acquisition cost over the asset's **probable useful life for the company**. [cbn]\n- The regime may be **linear**, **degressive**, or tied to **objective criteria** (usage intensity, production volume) , all acceptable for the annual accounts if they match either the spread over useful life or a tax-accepted accelerated system. [cbn]\n- Useful life is the **economic** life, not the legal life. [cbn]\n- **Supplementary (exceptional) depreciation** is required when an asset's carrying value exceeds its **usage value** due to technical or economic/technological obsolescence. [cbn]\n- A sale/replacement value above carrying value does **not** justify stopping the depreciation plan. [cbn]\n- **Book vs tax depreciation** can differ (tax: KB WIB 92 art. 36-38 for degressive). [cbn]\n\n> The accounting principle is stable; the **tax** depreciation rules and the [[investment-deduction]] change , verify those live.\n\n## Grounds\n\n[[chart-of-accounts-mar]] (class 2 assets, account 630 depreciation) and a planned `year-end/depreciation` practice page.\n\n## See also\n\n[[annual-accounts-nbb]] \u00b7 [[investment-deduction]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: CBN/CNC advies (depreciation), distilled. Verify the current advies text at cbn-cnc.be.", "research-development-advies": "\n# CBN advies , research and development costs\n\nA `references/cbn-adviezen/` page: the CBN/CNC treatment of **R&D costs**. Marginal for most one-person BVs, but relevant to a development-heavy company.\n\n## What the advies says\n\n- **Research costs: may NOT be capitalized** , since 1 January 2016 they are taken to the result immediately (KB of 18 December 2015; CBN-advies 138-1). [search]\n- **Development costs: may be capitalized** under rubric **21 \"Immateri\u00eble vaste activa\"** (account 210), if **all** the conditions are met cumulatively: technical feasibility of completion is demonstrable; intention and ability to complete and use/sell the asset; probable future economic benefits; adequate technical/financial resources; and the expenditure can be measured reliably. [search]\n- **Small companies may choose** to capitalize development costs or expense them directly , unless developing intangibles is their **main activity**. [search]\n- **Amortization:** capitalized development costs are written off systematically over their useful life ([[depreciation-advies|cf. depreciation]]), with disclosure if accelerated.\n\n## Grounds\n\n[[chart-of-accounts-mar]] (rubric 21 intangible assets) and the [[valuation-rules-advies|valuation frame]].\n\n## See also\n\n[[chart-of-accounts-mar]] \u00b7 [[depreciation-advies]] \u00b7 [[formation-costs-advies]]\n\nSource: CBN/CNC advies 138-1 + KB 18-12-2015, distilled. Verify the current advies text at cbn-cnc.be.", "size-criteria-advies": "\n# CBN / WVV , size criteria (art. 1:24 / 1:25)\n\nA `references/cbn-adviezen/` page: the **legal source** of the size thresholds the practice page [[company-size-criteria]] applies. Defined in the WVV itself; the CBN advises on their application (consolidated basis, the two-year rule).\n\n## What the law says (verify_live)\n\n- **Small company (art. 1:24 WVV):** at the balance-sheet date of the last closed year, exceeds **no more than one** of , avg **50** employees, turnover excl. VAT **EUR 11,250,000** (raised from 9,000,000), balance-sheet total **EUR 6,000,000** (raised from 4,500,000). [search]\n- **Micro company (art. 1:25 WVV):** a subcategory of small that is **not a parent or subsidiary** and exceeds no more than one of , avg **10** employees, turnover **EUR 900,000** (raised from 700,000), balance-sheet total **EUR 450,000** (raised from 350,000). [search]\n- Assessed on a **consolidated basis** where relevant, and on the **two-year consistency** rule (a threshold crossing only bites if exceeded in two consecutive years).\n\n> The figures are indexed/raised periodically. Confirm the current thresholds (and the consolidated-basis rule) , see [[company-size-criteria]] (`verify_live`) and the NBB.\n\n## Grounds\n\n[[company-size-criteria]] (the working summary) and the [[annual-accounts-nbb|annual-accounts model]] choice.\n\n## See also\n\n[[company-size-criteria]] \u00b7 [[annual-accounts-nbb]] \u00b7 [[eenmanszaak-vs-vennootschap]]\n\nSource: WVV art. 1:24/1:25 + CBN/CNC application guidance, distilled. Verify at ejustice / NBB.", "provisions-advies": "\n# CBN advies , provisions for risks and charges (voorzieningen)\n\nA `references/cbn-adviezen/` page: the CBN/CNC principles for **provisions for risks and charges**, a year-end judgement that grounds [[annual-accounts-nbb|the annual accounts]].\n\n## What the advies says\n\n- Provisions must meet the tests of **prudence, sincerity, and good faith**. [cbn]\n- **Obligation to provide** (art. 33 KB W.Venn.): account for all foreseeable risks, possible losses, and impairments arising in the year (or prior years), even if only known **between the balance-sheet date and the date the accounts are drawn up**. [cbn]\n- **Valuation:** the amount is adjusted at inventory date to a **current assessment** of the risk/charge. Provisions may **not be kept** to the extent they exceed what a current assessment requires (no hidden reserves). [cbn]\n- A risk arising **after** the balance-sheet date is in principle not provided for in the current year (annuality/periodicity). [cbn]\n- **Booking:** the year-to-year change in the liability item normally equals the algebraic sum of additions, uses, and reversals in the P&L. Exceptional provisions go through exceptional results unless the charge is operating/financial. [cbn]\n\n## Grounds\n\n[[chart-of-accounts-mar]] (class 1 provisions) and a planned `year-end/provisions` practice page.\n\n## See also\n\n[[annual-accounts-nbb]] \u00b7 [[double-entry-basics]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: CBN/CNC advies (provisions for risks and charges), distilled. Verify the current advies text at cbn-cnc.be.", "formation-costs-advies": "\n# CBN advies , formation costs (oprichtingskosten)\n\nA `references/cbn-adviezen/` page: the CBN/CNC treatment of **formation and expansion costs** , the setup costs of a company. Relevant when a new BV is incorporated.\n\n## What the advies says\n\n- Formation costs are **capitalized under rubric 20** (Oprichtingskosten) of the [[chart-of-accounts-mar|MAR]], unless taken to the result of the current year at once. They include incorporation, expansion, restructuring costs (notary fees, professional fees, loan-issue costs, ...). [cbn]\n- **Amortized** on a suitable plan, **at least 20% per year** (so over a maximum of ~5 years), systematically and **independently of the year's result** ([[depreciation-advies|cf. depreciation]]). [cbn]\n- **Restructuring costs** are only capitalized if they relate to a deep change with a **durable, favourable** effect on profitability. [cbn]\n- **Loan-issue costs** may instead be spread over the loan term. [cbn]\n- **Accelerated** amortization is allowed but disclosed; **additional** amortization is required if the real value falls below the net book value. [cbn]\n\n## Grounds\n\n[[chart-of-accounts-mar]] (rubric 20) and the early-life books of a new BV.\n\n## See also\n\n[[chart-of-accounts-mar]] \u00b7 [[depreciation-advies]] \u00b7 [[eenmanszaak-vs-vennootschap]]\n\nSource: CBN/CNC advies on formation/expansion costs, distilled. Verify the current advies text at cbn-cnc.be.", "valuation-rules-advies": "\n# CBN advies , valuation rules (waarderingsregels)\n\nA `references/cbn-adviezen/` page: the CBN/CNC principles for valuing items in the annual accounts , the foundation under [[annual-accounts-nbb|the annual accounts]] and [[double-entry-basics|the books]].\n\n## What the advies says\n\n- **Going concern (continuity):** valuation assumes the company continues its activity. The governing body must **annually reassess** whether that assumption still holds; material uncertainty must be disclosed, and if continuity no longer applies, **adjusted valuation rules** are used (CBN-advies 2018/18). [cbn]\n- **Acquisition value + individualization:** each asset is valued **separately at acquisition value**; inventory/asset cost is individualized unless another stated method (weighted average, FIFO) is used (CBN-advies 132/7). [cbn]\n- **Consistency (bestendigheid):** valuation rules are applied **consistently year to year**; a change must be disclosed and justified in the notes. [cbn]\n- **Prudence (voorzichtigheid):** depreciation, impairments, and [[provisions-advies]] meet prudence, sincerity, and good faith; a provision is formed for a very probable cost even if the probability is below 50.1%. [cbn]\n\n## Grounds\n\n[[annual-accounts-nbb]] and the year-end judgements; sits above [[depreciation-advies]] and [[provisions-advies]] as the common valuation frame.\n\n## See also\n\n[[depreciation-advies]] \u00b7 [[provisions-advies]] \u00b7 [[annual-accounts-nbb]]\n\nSource: CBN/CNC adviezen on valuation rules (incl. 2018/18, 132/7), distilled. Verify the current advies text at cbn-cnc.be.", "impairments-advies": "\n# CBN advies , impairments (waardeverminderingen)\n\nA `references/cbn-adviezen/` page: the CBN/CNC principles for **impairments** on receivables and inventory , a prudence-driven year-end write-down distinct from a [[provisions-advies|provision]]. Grounds [[closing-entries]].\n\n## What the advies says\n\n- Impairments follow the general principles (separate valuation, consistency, prudence, sincerity, good faith) and are **booked separately from the result** (CBN-advies 132/7). [cbn]\n- **Receivables:** an impairment is booked **only when there is uncertainty** about realization or payment at maturity (for short- and long-term receivables alike). [cbn]\n- **Inventory / work in progress:** write down to **net realizable value** when the production cost plus remaining costs exceeds the net selling price at year-end. [cbn]\n- **Reversal:** reversing an impairment is **mandatory** when it has become excessive or pointless, booked under \"terugneming van waardeverminderingen\" in the P&L (an exception to the usual rule). [cbn]\n\n## Grounds\n\n[[closing-entries]] (step 2, impairments) and the [[valuation-rules-advies|valuation frame]]; sits next to [[provisions-advies]] as the other prudence write-down.\n\n## See also\n\n[[closing-entries]] \u00b7 [[provisions-advies]] \u00b7 [[valuation-rules-advies]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: CBN/CNC advies on impairments (incl. 132/7), distilled. Verify the current advies text at cbn-cnc.be.", "distribution-test-advies": "\n# CBN advies , distribution test (net-asset + liquidity)\n\nA `references/cbn-adviezen/` page: under the WVV, a BV may only distribute profit (dividend, [[vvpr-bis-dividends|VVPR-bis]], [[liquidation-reserve|liquidation reserve]]) after passing a **double test**. The CBN advies explains both.\n\n## What the advies says\n\n### 1. Net-asset test (art. 5:142 WVV for the BV)\n\n- After the distribution, the company's **net asset may not become (or threaten to become) negative**. [cbn]\n- **Net asset** = total assets minus provisions, debts, unamortized formation/expansion costs, and R&D costs; statutorily **unavailable contributions** must also be respected. [cbn]\n- If the net asset would go negative, the **alarm-bell procedure** applies (art. 5:153 WVV). [cbn]\n\n### 2. Liquidity test\n\n- The governing body must judge that, after the distribution, the company can **pay its due debts for at least 12 months**. [cbn]\n- It is a **forward-looking** assessment of the liquidity position, accounting for near-certain events in that period. [cbn]\n- It is done **after the distribution decision but before the actual payment** to beneficiaries. [cbn]\n\n## Grounds\n\nThe payout decisions in [[vvpr-bis-dividends]], [[liquidation-reserve]], and [[director-remuneration]] , a distribution is only legal if both tests pass.\n\n## See also\n\n[[vvpr-bis-dividends]] \u00b7 [[liquidation-reserve]] \u00b7 [[director-remuneration]]\n\nSource: CBN/CNC advies on the WVV distribution tests, distilled. Verify the current advies + articles at cbn-cnc.be / ejustice."}, "typeColor": {"rule": "#378ADD", "reference": "#1D9E75", "workflow": "#BA7517", "concept": "#7F77DD"}, "predColor": {"requires": "#D85A30", "unlocks": "#639922", "gates": "#E24B4A", "grounded_by": "#0F6E56", "affects": "#185FA5", "alternative_to": "#534AB7", "part_of": "#5F5E5A"}};
const byId = Object.fromEntries(B.nodes.map(n=>[n.data.id,n.data]));
const cy = cytoscape({container:document.getElementById('graph'),
 elements:{nodes:B.nodes,edges:B.edges},
 style:[
  {selector:'node',style:{'background-color':'data(color)','width':'data(size)','height':'data(size)','label':'data(label)','font-size':9,'text-wrap':'wrap','text-max-width':110,'color':'#333','text-valign':'bottom','text-margin-y':2}},
  {selector:'edge',style:{'width':1.4,'line-color':'data(color)','target-arrow-color':'data(color)','target-arrow-shape':'triangle','arrow-scale':0.8,'curve-style':'bezier','label':'data(label)','font-size':8,'color':'#777','text-rotation':'autorotate'}},
  {selector:'edge[typed="no"]',style:{'line-style':'dashed','target-arrow-shape':'none','width':1}},
  {selector:'.dim',style:{'opacity':0.12}},{selector:'.hi',style:{'opacity':1}}
 ],
 layout:{name:'cose',animate:false,nodeRepulsion:9000,idealEdgeLength:90}});
function show(id){const d=byId[id];if(!d)return;
 document.getElementById('title').textContent=d.label;
 document.getElementById('meta').innerHTML='<span class="chip" style="background:'+d.color+'">'+d.type+'</span> '+(d.description||'');
 document.getElementById('body').innerHTML=marked.parse(B.bodies[id]||'');
}
cy.on('tap','node',e=>{const id=e.target.id();show(id);
 cy.elements().addClass('dim');const nb=e.target.closedNeighborhood();nb.removeClass('dim').addClass('hi');});
cy.on('tap',e=>{if(e.target===cy)cy.elements().removeClass('dim hi');});
document.getElementById('q').addEventListener('input',ev=>{const v=ev.target.value.toLowerCase();
 cy.nodes().forEach(n=>{const hit=!v||n.data('label').toLowerCase().includes(v)||n.id().includes(v);n.style('opacity',hit?1:0.15);});});
function relayout(name){cy.layout(name==='cose'?{name:'cose',animate:false,nodeRepulsion:9000,idealEdgeLength:90}:{name:'concentric',animate:false}).run();}
function fit(){cy.fit(undefined,40);}
document.getElementById('legend').innerHTML=
 Object.entries(B.typeColor).map(([k,c])=>'<span class="chip" style="background:'+c+'">'+k+'</span>').join('')+
 ' &nbsp;|&nbsp; '+Object.entries(B.predColor).map(([k,c])=>'<span class="chip" style="background:'+c+'">'+k+'</span>').join('');
show(B.nodes[0].data.id);
</script></body></html>
