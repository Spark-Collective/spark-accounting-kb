"provisions-advies__link__chart-of-accounts-mar", "source": "provisions-advies", "target": "chart-of-accounts-mar", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "formation-costs-advies__link__eenmanszaak-vs-vennootschap", "source": "formation-costs-advies", "target": "eenmanszaak-vs-vennootschap", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "formation-costs-advies__link__depreciation-advies", "source": "formation-costs-advies", "target": "depreciation-advies", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "formation-costs-advies__link__chart-of-accounts-mar", "source": "formation-costs-advies", "target": "chart-of-accounts-mar", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "valuation-rules-advies__link__depreciation-advies", "source": "valuation-rules-advies", "target": "depreciation-advies", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "valuation-rules-advies__link__double-entry-basics", "source": "valuation-rules-advies", "target": "double-entry-basics", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "valuation-rules-advies__link__provisions-advies", "source": "valuation-rules-advies", "target": "provisions-advies", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "impairments-advies__link__chart-of-accounts-mar", "source": "impairments-advies", "target": "chart-of-accounts-mar", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "impairments-advies__link__closing-entries", "source": "impairments-advies", "target": "closing-entries", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "impairments-advies__link__valuation-rules-advies", "source": "impairments-advies", "target": "valuation-rules-advies", "label": "", "color": "#B4B2A9", "typed": "no"}}, {"data": {"id": "impairments-advies__link__provisions-advies", "source": "impairments-advies", "target": "provisions-advies", "label": "", "color": "#B4B2A9", "typed": "no"}}], "bodies": {"chart-of-accounts-mar": "\n# Belgian chart of accounts (MAR / PCMN)\n\nA Belgian company keeping [[eenmanszaak-vs-vennootschap|double-entry books]] must use the standardized **Minimum Genormaliseerd Rekeningstelsel (MAR)** / **Plan Comptable Minimum Normalis\u00e9 (PCMN)**, set by Royal Decree. The structure is fixed; a small management BV instantiates only the slice it uses.\n\n| Class | NL | What | ERPNext root type |\n|---|---|---|---|\n| 1 | Eigen vermogen, voorzieningen, schulden >1j | Capital, reserves, retained earnings, provisions, long-term debt | Equity + Liability |\n| 2 | Vaste activa | Intangible / tangible / financial fixed assets, depreciation | Asset |\n| 3 | Voorraden | Inventory, work in progress | Asset |\n| 4 | Vorderingen & schulden <=1j | Trade debtors (40), creditors (44), VAT (411 recoverable / 451 payable), taxes & social (45), current accounts (48/49) | Asset + Liability |\n| 5 | Geldbeleggingen & liquide middelen | Bank (550), cash (570) | Asset |\n| 6 | Kosten | Goods/services (60-61), remuneration (62), depreciation (630), financial (65), taxes (67) | Expense |\n| 7 | Opbrengsten | Turnover/sales (70), other operating (74), financial income (75) | Income |\n| 0 | Rechten & verplichtingen buiten balans | Off-balance commitments | (memo) |\n\n## Practice notes\n\n- A one-person consultancy/management BV uses mostly classes 4, 5, 6, 7 plus equity (1) and a little fixed-asset (2); class 3 (inventory) is usually unused.\n- The **VAT accounts** (411 te recupereren btw / 451 verschuldigde btw) are central to the [[vat-period-prep]] workflow.\n- Account *numbers* are standardized; the firm's specific sub-accounts come from the existing books , import the real chart rather than rebuilding it generically.\n\n## See also\n\n[[eenmanszaak-vs-vennootschap]] \u00b7 [[vat-rates-and-regimes]] \u00b7 [[vat-period-prep]]", "double-entry-basics": "\n# Double-entry bookkeeping basics\n\nIn Belgium a company always keeps **double-entry** bookkeeping (some small sole traders may opt for simplified , see [[eenmanszaak-vs-vennootschap]]). Every transaction is booked **twice**: a **debit** (where the value goes) and a **credit** (where it comes from), so debit always equals credit and the books stay in balance.\n\n## The flow\n\n- **Journals / dagboeken** record entries chronologically , typically a purchases, sales, financial, and miscellaneous journal. [search]\n- The **general ledger (grootboek)** holds every account (the [[chart-of-accounts-mar|MAR accounts]]); journal entries post to it. [search]\n- A **trial balance (proef- en saldibalans)** proves debit = credit. [search]\n\n## The two reports\n\n- **Balance sheet (balans):** a snapshot , **assets = liabilities + equity**. Holds what the company owns and owes (MAR classes 1-5).\n- **Profit & loss (resultatenrekening):** a period view , **income minus costs** (MAR classes 6-7), closed against equity.\n- Costs/income live only in the P&L; assets/liabilities only on the balance sheet. Most transactions touch one of each.\n\nAt year-end these become the **annual accounts** (balance sheet + P&L + notes), filed at the NBB ([[annual-accounts-nbb]]).\n\n## See also\n\n[[chart-of-accounts-mar]] \u00b7 [[annual-accounts-nbb]] \u00b7 [[eenmanszaak-vs-vennootschap]]\n\nSource: linkup search synthesis; verify treatment against CBN/CNC.", "document-retention": "\n# Document retention period\n\nA law of 20 November 2022 **extended the general retention period from 7 to 10 years** for accounting documents and invoices , for both VAT and direct taxes.\n\n## The rule (verify_live)\n\n- **General: 10 years**, counted from **1 January of the year following** the financial year (or the invoice date). Applies from **income year 2022 (assessment year 2023)** onward. [search]\n- **Older years stay at 7 years:** documents for income year 2021 and earlier keep the old 7-year term. [search]\n- **Real-estate documents** with VAT deducted (purchase deeds, renovation contracts, the related invoices): **15 years**, sometimes **25 years**, because the VAT revision period runs that long. [search]\n- **Investment invoices:** keep until **7 or 10 years after the year of the last depreciation**. [search]\n- **Paper or digital** are equivalent, provided **authenticity, integrity, and legibility** are guaranteed for the whole period. [search]\n\n> Confirm the current terms with [FOD Financi\u00ebn](https://financien.belgium.be) , the extension is recent and the start year matters.\n\n## Why it matters\n\nDrives the agent's archival policy: a one-person BV in 2026 keeps everything from FY2022 until end-2032, and real-estate VAT files far longer. Ties to the [[chart-of-accounts-mar|books]] and the [[annual-accounts-nbb|filed annual accounts]].\n\n## See also\n\n[[chart-of-accounts-mar]] \u00b7 [[annual-accounts-nbb]] \u00b7 [[peppol-e-invoicing]]\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn.", "pcmn-account-codes": "\n# PCMN/MAR account codes (sub-account level)\n\nSub-account detail within the legally mandated chart ([[chart-of-accounts-mar]], RD 29-04-2019). Not exhaustive , the slice a one-person management BV actually posts to. The firm's real chart (imported from the books) is authoritative.\n\n## Equity, provisions, long-term debt (class 1)\n\n| Code | Account |\n|---|---|\n| 10 | Capital |\n| 13 / 130 / 133 | Reserves / legal reserve / available reserves |\n| 14 | Retained earnings (or accumulated loss) |\n| 16 | Provisions for liabilities and charges |\n| 17 | Amounts payable after more than one year |\n\n## Fixed assets (class 2)\n\n| Code | Account |\n|---|---|\n| 20 | Formation costs ([[formation-costs-advies]]) |\n| 21 / 22-27 | Intangible / tangible fixed assets (24 = furniture & vehicles) |\n| ...9 | Accumulated depreciation (contra) ([[depreciation]]) |\n\n## Receivables, cash, payables (classes 4-5)\n\n| Code | Account |\n|---|---|\n| 40 / 400 | Trade debtors |\n| 411 | **VAT recoverable** |\n| 416 / 48 | Other receivables / miscellaneous |\n| 44 / 440 | Trade creditors |\n| 451 | **VAT payable** |\n| 453 | Withholding tax payable (bedrijfsvoorheffing, see [[withholding-on-director-pay]]) |\n| 454-459 | Social security / remuneration payable |\n| 489 | Director current account ([[director-loan-rekening-courant]]) |\n| 490-493 | Accruals / deferrals (cut-off) |\n| 550 / 570 | Bank / cash |\n\n## Costs + income (classes 6-7)\n\n| Code | Account |\n|---|---|\n| 60 / 61 | Purchases / services and other goods |\n| 618 | Director remuneration ([[director-remuneration]]) |\n| 630 | Depreciation and amounts written off |\n| 635-637 / 662 | Provisions ([[provisions]]) |\n| 64 / 65 | Other operating / financial charges |\n| 67 | Income taxes ([[corporate-tax-basics]]) |\n| 70 / 74 / 75 | Turnover / other operating income / financial income |\n\n## See also\n\n[[chart-of-accounts-mar]] \u00b7 [[double-entry-basics]] \u00b7 [[classification-protocol]]\n\nSource: PCMN/MAR (RD 29-04-2019); standard codes. Verify specifics against the MAR / the firm's chart.", "provisions": "\n# Provisions (voorzieningen) , practice\n\nThe working procedure for provisions for risks and charges, applying the principles in the [[provisions-advies|CBN advies]] and the [[valuation-rules-advies|valuation frame]].\n\n## In the books\n\n- The provision sits on the **liability side in rubric 16** (160-165) of the [[chart-of-accounts-mar|MAR]].\n- **Forming/increasing** a provision is a cost: operating provisions via **635-637** (635 pensions, 636 large repairs/maintenance, 637 other operating risks), exceptional/non-recurrent via **662**.\n- **Reversing** a non-recurrent provision is income via **762** (terugneming).\n- The **year-to-year change** in the rubric-16 balance equals the algebraic sum of additions, uses, and reversals ([[provisions-advies]]).\n\n## At year-end\n\n- Account for **all foreseeable risks and probable losses** existing at the balance-sheet date, even if only known between the balance date and when the accounts are drawn up.\n- **Reassess** each provision to a current estimate; do **not** keep an excess (no hidden reserves).\n- A risk arising **after** the balance date is in principle not provided for in the current year (annuality).\n\n## Why it matters\n\nProvisions are a prudence-driven judgement that shapes the result and the [[corporate-tax-basics|tax base]] (some are disallowed). The agent forms/reverses them as part of [[closing-entries]] before the [[annual-accounts-nbb|annual accounts]].\n\n## See also\n\n[[provisions-advies]] \u00b7 [[closing-entries]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: CBN/CNC principles + MAR accounts; verify treatment against CBN/CNC.", "annual-accounts-nbb": "\n# Annual accounts filing (NBB)\n\nA BV files its annual accounts electronically at the **NBB Central Balance Sheet Office** each year. The model depends on the company's [[company-size-criteria|size]].\n\n## The rule (verify_live)\n\n- **Deadline:** within **30 days of approval** by the general meeting, and at the latest **7 months after the financial-year close**. For a calendar-year 2025, the deadline is **1 August 2026**. [search]\n- **Electronic only:** filed via the NBB application (no counters since 2010). [search]\n- **Model by size:** **micro model** (micro companies, minimal notes), **abridged/verkort model** (small companies), **full model** (larger). [search]\n- **Format: XBRL preferred** (cheaper, structured); PDF possible (and sometimes mandatory for specific sectors). [search]\n\n### Filing fees 2026 (excl. penalties) [search]\n\n| Model | XBRL | PDF |\n|---|---|---|\n| Micro | EUR 67.00 | EUR 137.30 |\n| Abridged | EUR 89.40 | EUR 159.50 |\n| Full | EUR 379.50 | EUR 449.70 |\n\n- **Late filing penalty** (from the 8th month after close), micro/abridged: ~EUR 151 in the 9th month, ~EUR 227 in months 10-12. [search]\n\n> Fees, deadlines, and penalties change yearly. **Confirm with the [NBB](https://www.nbb.be/en/central-balance-sheet-office)** before filing.\n\n## Why it matters\n\nThis is a hard annual deadline with an automatic penalty , a scheduled agent task: assemble the micro/abridged model from the closed books, file in XBRL, pay the fee, and record proof.\n\n## See also\n\n[[company-size-criteria]] \u00b7 [[corporate-tax-basics]] \u00b7 [[chart-of-accounts-mar]] \u00b7 [[valuation-rules-advies]] \u00b7 [[depreciation-advies]] \u00b7 [[provisions-advies]]\n\nSource: linkup search synthesis; verify against NBB.", "closing-entries": "\n# Year-end closing entries\n\nThe set of entries posted at year-end, after the last [[month-end-close]], to bring the books to the position the [[annual-accounts-nbb|annual accounts]] report. Driven by the [[valuation-rules-advies|valuation rules]].\n\n## The typical sequence\n\n1. **Depreciation** , post the annual charge per the plan ([[depreciation]]).\n2. **Impairments (waardeverminderingen)** , write down assets (debtors, inventory) below carrying value where needed.\n3. **Provisions** , form/reassess/reverse provisions for risks and charges ([[provisions]]).\n4. **Cut-off (overlopende rekeningen, 490-493)** , accrue costs/income spanning year-ends: prepaid charges, accrued income, accrued charges, deferred income.\n5. **Inventory** , value stock and work in progress (acquisition value, or lower).\n6. **Accrued interest / other accruals**.\n7. **Corporate-tax provision** , book the estimated [[corporate-tax-basics|corporate tax]] for the year.\n8. **Close the P&L** to the result, and the result to equity.\n\n## Why it matters\n\nThese entries decide the year's result and the [[corporate-tax-basics|tax base]] (accounting profit + disallowed expenses). They are the substance of the [[year-end-close]] workflow.\n\n## See also\n\n[[year-end-close]] \u00b7 [[depreciation]] \u00b7 [[provisions]] \u00b7 [[annual-accounts-nbb]]\n\nSource: CBN/CNC principles + MAR; verify treatment against CBN/CNC.", "depreciation": "\n# Depreciation (afschrijvingen) , practice\n\nThe working procedure for spreading a fixed asset's cost over its life. The accounting principles are grounded in the [[depreciation-advies|CBN advies]] and the [[valuation-rules-advies|valuation frame]]; this page is how the agent applies them.\n\n## In the books\n\n- Set a **depreciation plan** over the asset's **economic useful life** (e.g. laptop 3 years, machinery longer), method **linear** (most common) or degressive.\n- Book the annual charge to **account 630** (afschrijvingen, a class-6 cost) against the **accumulated depreciation** on the class-2 asset (see [[chart-of-accounts-mar]]).\n- A **pro-rata** charge often applies in the year of acquisition.\n- Add **exceptional depreciation** if the carrying value exceeds the asset's usage value ([[depreciation-advies|advies]]).\n\n## Book vs tax\n\n- The **book** depreciation follows the plan; the **tax** rules can differ (e.g. first-year limits, accepted accelerated systems). Track both.\n- The [[investment-deduction]] is a **separate** tax benefit on top of depreciation, not a substitute.\n- Small items below a threshold may be expensed at once (verify the current threshold).\n\n## Why it matters\n\nDepreciation is the main recurring year-end entry that shapes the result, and it interacts with the [[corporate-tax-basics|tax base]]. The agent maintains the asset register and posts the annual charge before the [[annual-accounts-nbb|annual accounts]].\n\n## See also\n\n[[depreciation-advies]] (CBN advies) \u00b7 [[investment-deduction]] \u00b7 [[annual-accounts-nbb]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: CBN/CNC principles + practice; verify tax depreciation rules against FOD Financi\u00ebn.", "social-contributions-self-employed": "\n# Social contributions for the self-employed / director\n\nA self-employed person and a **company director** (usually self-employed status) pay social contributions to a **social insurance fund** affiliated with **RSVZ/INASTI**. These directly affect net income and the tax base.\n\n## How it works (verify_live)\n\n- **Base:** net taxable professional income. Contributions are **provisional** (computed on income from ~3 years prior) and later **regularised** to the final year's income. [grok/rsvz]\n- **Rate:** roughly **~20.5%** on the lower income bracket, with a lower rate above a ceiling, plus **minimum** contributions and an income **cap**. [grok/rsvz]\n- **Main vs secondary activity** (hoofdberoep / bijberoep) changes the minima and rights.\n- **Director of a BV:** typically self-employed; the choice of **salary vs management fee** affects both the social-contribution base and the corporate-tax picture (see [[director-remuneration]], planned).\n\n> Rates, minima, and caps change yearly. **Confirm current figures with [RSVZ/INASTI](https://www.rsvz-inasti.fgov.be/)** before computing.\n\n## Why it matters\n\nSocial contributions are deductible and materially change the director's net , the agent must account for them when modelling salary vs dividend, and when reconciling the director's current account.\n\n## See also\n\n[[eenmanszaak-vs-vennootschap]] \u00b7 [[company-size-criteria]]\n\nSource: Grok research synthesis; verify against RSVZ/INASTI.", "withholding-on-director-pay": "\n# Withholding tax on director pay (bedrijfsvoorheffing)\n\nWhen a BV pays its director a salary, it must **withhold bedrijfsvoorheffing** on the monthly gross and **remit it to the tax authority** , an advance on the director's personal income tax, so part of the bill is already paid by the annual return.\n\n## The rule (verify_live)\n\n- Withheld on the **monthly gross** director remuneration and any taxable benefits. [astro]\n- Computed via the **government's official formula/scales**, based on income and benefits. [astro]\n- Typically run through a **sociaal secretariaat** (social secretariat), which calculates and files it. [astro]\n\n> The scales and formula are updated (at least yearly). **Use the current official calculation** ([FOD Financi\u00ebn](https://financien.belgium.be)); do not reuse last year's figures.\n\n## Why it matters\n\nIt is the payroll-side counterpart of the company's own [[advance-payments|corporate-tax prepayment]]: getting the withholding right avoids a surprise at the director's personal assessment. It sits on top of the gross set in [[director-remuneration]] and the [[social-contributions-self-employed|social contributions]].\n\n## See also\n\n[[director-remuneration]] \u00b7 [[social-contributions-self-employed]] \u00b7 [[benefits-in-kind-vaa]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "per-diem-domestic-travel": "\n# Per diem for domestic business travel (forfaitaire dagvergoeding)\n\nA fixed daily allowance the company pays the director to cover meals and drinks on a professional trip **within Belgium**. Done right, it is a clean optimization: **tax-free for the director** and **100% deductible for the company**.\n\n## The rule (verify_live)\n\n- **Daily allowance:** a fixed amount per qualifying travel day. [astro]\n- **Monthly allowance:** allowed for regular travel, on condition of **on average 16 travel workdays per month**. [astro]\n- **Tax-free for the director** if all conditions are met; **100% deductible** for the company. [astro]\n- **Maximum amounts are indexed and updated periodically** (new amounts applied from 01.03.2026, previous set 01.03.2025-28.02.2026). [astro]\n\n> The maximum amounts change (roughly twice a year). **Confirm the current ceiling with [FOD Financi\u00ebn](https://financien.belgium.be)** before paying; exceeding it makes the excess taxable.\n\n## Why it matters\n\nUnlike a [[restaurant-and-meals|restaurant cost]] (~69%, no VAT recovery), a compliant per diem is fully deductible and untaxed , a better-structured way to cover travel meals. The agent tracks qualifying travel days and applies the current ceiling, as part of [[director-remuneration]].\n\n## See also\n\n[[restaurant-and-meals]] \u00b7 [[director-remuneration]] \u00b7 [[benefits-in-kind-vaa]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "director-remuneration": "\n# Director remuneration (salary vs dividend)\n\nHow a one-person BV pays its director is the central tax-planning decision. The two channels behave very differently.\n\n## Salary (bedrijfsleidersbezoldiging)\n\n- **Deductible** at the company (reduces the corporate-tax base).\n- Taxed in the director's **personal income tax** (progressive) plus [[social-contributions-self-employed|social contributions]].\n- Builds social rights (pension). [fod/rsvz]\n\n## Dividend\n\n- **Not deductible** (paid from after-tax profit), but taxed at a **flat withholding** , potentially the reduced [[vvpr-bis-dividends|VVPR-bis]] 15% (rising to 18% from 1 July 2026) instead of 30%.\n- Builds no social rights.\n\n## The optimization (verify_live)\n\n- Pay **at least EUR 45,000 director remuneration** to unlock the [[corporate-tax-basics|20% reduced corporate rate]] (or remuneration >= profit if profit is lower; start-ups exempt in early years). The planned rise to EUR 50,000 is not yet in force for 2026 , confirm. [search]\n- Beyond that threshold, additional payout is often more efficient as a **dividend** (VVPR-bis) or via a **liquidation reserve** than as more salary, because salary stacks progressive tax + social contributions.\n\n> The EUR 45,000 threshold and the rates change. **Confirm current figures with [FOD Financi\u00ebn](https://financien.belgium.be) / [RSVZ](https://www.rsvz-inasti.fgov.be/)** before modelling a real year.\n\n## Why it matters\n\nSalary-vs-dividend is the headline number a freelancer leaves an accounting office to optimize , so it is a flagship accounting agent calculation, combining [[corporate-tax-basics]], [[vvpr-bis-dividends]], and [[social-contributions-self-employed]].\n\n## See also\n\n[[vvpr-bis-dividends]] \u00b7 [[corporate-tax-basics]] \u00b7 [[social-contributions-self-employed]]\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn / RSVZ.", "benefits-in-kind-vaa": "\n# Benefits in kind (Voordeel van Alle Aard, VAA)\n\nA VAA is a benefit the company gives the director (or an employee) for private use , a company car, free housing, a phone/internet subscription, an interest-free loan, etc. It is added to the recipient's **taxable professional income**. The tax authority values it at either its **real value** or a **forfait** (fixed formula); the real value is often lower and so preferable.\n\n## Common forfaits (verify_live)\n\n- **Company car:** a forfait on the vehicle's **catalogue price and CO2 emissions**; there is an indexed annual minimum (the 2026 minimum is indexed, confirm). Interacts with [[car-and-mobility|car-cost deductibility]]. [search]\n- **Smartphone:** ~**EUR 36/year**; **internet:** ~**EUR 60/year** (standard forfaits). [search]\n- **Free housing (director):** a higher formula of **3.8 x the indexed cadastral income** (the old natural-vs-legal-person distinction was ruled unconstitutional). [search]\n- **Reimbursed to the company -> not taxed** (the director pays the benefit back, no VAA). [search]\n\n> Confirm all forfait figures with [FOD Financi\u00ebn](https://financien.belgium.be) before applying , several are indexed yearly.\n\n## Why it matters\n\nVAA is part of the director's remuneration package, so it ties into [[director-remuneration|salary planning]]: in 2026 a director's total remuneration may consist of **at most 20% forfait VAA**, which matters for the EUR 45,000 minimum that unlocks the [[corporate-tax-basics|20% corporate rate]]. The agent must value each benefit and book the matching VAA.\n\n## See also\n\n[[director-remuneration]] \u00b7 [[ict-equipment]] \u00b7 [[car-and-mobility]]\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn.", "home-office": "\n# Home-office allowance (bureauvergoeding)\n\nA company can pay its director a **fixed monthly office allowance** for structurally working from home , **tax-free and RSZ-free** , covering the cost of a home workspace. Like the [[per-diem-domestic-travel|per diem]], it is a clean way to move private-overlap costs into the company without a benefit.\n\n## The rule (verify_live)\n\n- **Max ~EUR 160.99/month** (from 1 March 2026, indexed). [search]\n- Covers: use of a workspace in the private home, small office material, maintenance/cleaning, electricity/water/heating, insurance, onroerende voorheffing. [search]\n- **Conditions:** the person **regularly and structurally** works from home, and the company does **not** otherwise cover these office costs. Without structural home work, the forfait does not apply (reimbursement is then only untaxed if the company proves the costs are its own and actually spent). [search]\n- **Only via a company:** a self-employed person **without** a company ([[eenmanszaak-vs-vennootschap|eenmanszaak]]) cannot use this forfait. [search]\n\n> The amount is indexed (changed 1 March 2026). **Confirm the current ceiling** (RSZ instructions / Circulaire 2021/C/20) before paying; over-paying without proof makes the excess taxable.\n\n## Why it matters\n\nA recurring, fully untaxed reimbursement for a one-person BV run from home , the agent applies the current ceiling monthly. Distinct from the car-side [[benefits-in-kind-vaa|VAA]].\n\n## See also\n\n[[per-diem-domestic-travel]] \u00b7 [[director-remuneration]] \u00b7 [[kilometer-allowance]]\n\nSource: linkup search synthesis (RSZ / Circulaire 2021/C/20); verify against the current RSZ instructions.", "car-and-mobility": "\n# Deductibility of car and mobility costs\n\nOne of the most-asked practical questions for a management BV. The deductible fraction of car costs in Belgium is **not flat** , it depends on the vehicle (CO2/fuel type), and the rules have been tightening (phase-out of fossil-fuel deductibility, favourable treatment for electric).\n\n> **verify_live + confidence: medium.** Car deductibility changes frequently and by vehicle. **Always confirm the current formula and percentages with [FOD Financi\u00ebn](https://financien.belgium.be)** (or the accountant) before booking , do not apply a remembered percentage.\n\n## The shape of the rule (verify the numbers)\n\n- **Deductible % is formula-based** on the vehicle's CO2 emissions and fuel type; a fossil car is well below 100%, an electric car has been treated more favourably, with a transition regime over several years.\n- **Fuel/energy costs** follow their own deductible fraction.\n- A **benefit in kind (VAA)** arises if the company car is used privately , see [[payroll-director]] (planned), and it interacts with the deduction.\n- VAT on a car is typically only partly deductible (capped, with a professional-use limit).\n\n## Booking\n\nCar costs hit class 6 expense accounts; the non-deductible fraction is a tax add-back at year-end ([[year-end]], planned), not a bookkeeping exclusion , book the full cost, disallow the right fraction in the corporate-tax computation.\n\n## See also\n\n[[chart-of-accounts-mar]] \u00b7 [[eenmanszaak-vs-vennootschap]]", "sponsoring": "\n# Sponsoring costs\n\nSponsoring (money or means given to an event/project/organisation in return for visibility or benefits) is deductible, but the rate depends on **what the company gets back**.\n\n## The rule (verify_live)\n\n- **In return for publicity: 100% deductible** as a professional cost , e.g. the company's logo/name on posters, flyers, banners, social media, a website link. The spend is clearly aimed at visibility. [astro]\n- **In return for benefits: 50% deductible** as **representation costs** , e.g. receiving event tickets used to invite staff or clients. The representation element caps it at 50%. [astro]\n\n> Confirm the current treatment with [FOD Financi\u00ebn](https://financien.belgium.be); document the publicity received (photos of the banner, the web mention) to support the 100% case.\n\n## Booking\n\nSplit by nature: the publicity portion (100%) and any representation portion (50%) book to their class-6 accounts (see [[chart-of-accounts-mar]]); the non-deductible fraction of the representation part is a tax add-back ([[year-end]], planned). The 50% representation cap mirrors the logic on [[restaurant-and-meals]].\n\n## See also\n\n[[restaurant-and-meals]] \u00b7 [[ict-equipment]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "toll-peage": "\n# Toll and peage costs\n\nToll / peage on a [[car-and-mobility|company car]] (e.g. driving abroad toward France or Italy) **can run through the company** as a professional cost , even on a holiday trip.\n\n## The rule\n\n- **Toll/peage is a company cost.** [astro]\n- **Private use is already taxed via the car's [[benefits-in-kind-vaa|VAA]].** The company-car benefit covers not just the car itself but also fuel (home and abroad), car washes, and **toll/peage on holidays** , so a private holiday trip is captured through the VAA, not by disallowing the toll. [astro]\n\nSo the toll is booked as a company cost, and the private dimension is handled on the benefit-in-kind side rather than as a separate non-deductible item.\n\n## Booking\n\nBook to the car-cost group (class 6, see [[chart-of-accounts-mar]]); it follows the same CO2-based deductibility as the rest of the car costs in [[car-and-mobility]]. The private element flows through the VAA, not a separate add-back.\n\n## See also\n\n[[car-and-mobility]] \u00b7 [[benefits-in-kind-vaa]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: Astro Tax help (collaboration source, distilled).", "reading-glasses": "\n# Reading glasses\n\nReading glasses (leesbril) can be booked as a professional cost, but only **partly** and **not with certainty** , they are a classic dual-use item where the line between professional and private is blurred.\n\n## The rule (verify_live)\n\n- **Up to ~50% deductible** as a professional cost. [astro]\n- **No guarantee at a control:** the tax authority may take a stricter view of what counts as a genuine professional cost; the deduction can be challenged. [astro]\n- **Blue-light-filter glasses** are often pitched for screen work but are also seen as a **personal aid** usable outside work, which weakens the deduction. [astro]\n\n> The 50% is a practical ceiling, not a statutory certainty , confirm with the accountant, and keep documentation of the professional need.\n\n## Why it matters\n\nAnother instance of the **professional-character test** ([[streaming-subscriptions]]): for items usable both at work and privately, expect scrutiny and deduct conservatively. Contrast with a clearly professional tool like [[ict-equipment]] (100% income-tax deductible).\n\n## See also\n\n[[streaming-subscriptions]] \u00b7 [[ict-equipment]] \u00b7 [[restaurant-and-meals]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "streaming-subscriptions": "\n# Streaming subscriptions (Spotify, Apple Music, ...)\n\nA music/streaming subscription is deductible **only if the service is genuinely part of the work** , you must be able to show it is needed to carry out the professional activity, not a private comfort.\n\n## The rule (verify_live)\n\n- **Deductible** when the streaming service is intrinsic to the activity , e.g. a **podcaster** who publishes on Spotify, or an **artist** distributing their music. [astro]\n- **Not deductible** when the link is weak , e.g. an IT consultant or lawyer who \"concentrates better\" with music. The tax authority treats this as a **private cost** and will reject it at a control. [astro]\n- **Watch the terms of use:** consumer streaming plans are for personal, non-commercial use , playing them publicly in a shop/salon/office is not allowed and does not make them deductible. [astro]\n\n> The deductible/not test is fact-specific; confirm with the accountant or [FOD Financi\u00ebn](https://financien.belgium.be) for a borderline case.\n\n## Why it matters\n\nThis is a clean example of the **professional-character test** that governs many small costs: the burden is on the taxpayer to show the business need. The same logic gates [[restaurant-and-meals|business meals]] and other dual-use items like [[reading-glasses]].\n\n## See also\n\n[[reading-glasses]] \u00b7 [[ict-equipment]] \u00b7 [[restaurant-and-meals]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "fines": "\n# Fines paid by the company\n\nA company can pay a traffic fine (e.g. on a [[car-and-mobility|company car]]) from its account, but the fine is **not deductible** , it is a **disallowed expense** (verworpen uitgave).\n\n## The rule\n\n- **Fines are 100% non-deductible.** The company still pays corporate tax (20% or 25%, see [[corporate-tax-basics]]) on the fine amount as a disallowed expense. [astro]\n- **Total cash out = fine + ~20%** of the fine in tax. Still cheaper than paying it privately from already-taxed income. [astro]\n\n## Booking\n\nBook the payment to a class-6 account, then add it back in full in the corporate-tax computation as a disallowed expense ([[expense-categorization]] flags it). The booking is normal; the deduction is denied.\n\n## See also\n\n[[corporate-tax-basics]] \u00b7 [[car-and-mobility]] \u00b7 [[expense-categorization]]\n\nSource: Astro Tax help (collaboration source, distilled).", "hybrid-car-rules-2026": "\n# Hybrid car deductibility from 2026\n\nPart of the ongoing fossil-vehicle phase-out (see [[car-and-mobility]]). The rules below are for **corporate tax** (personal income tax keeps a separate transition regime).\n\n## The rule (verify_live)\n\n- **Hybrid cars ordered from 1 January 2026 are no longer deductible** in the company. [astro]\n- **Order date drives the regime**, not the delivery or payment date. [astro]\n- **Grandfathering:** a car **ordered before 1 July 2023** keeps the deductibility that applied at the order moment for its whole life (while it stays with the same owner). [astro]\n- The treatment is evolving (an earlier transition regime was changed to align with EU law), so this is a fast-moving area. [astro]\n\n> This is a **fast-changing** rule. **Always confirm with [FOD Financi\u00ebn](https://financien.belgium.be) or the accountant before ordering, leasing, or renting a car.**\n\n## Why it matters\n\nThe order date is decisive and the window is closing , a concrete timing decision the agent should flag before any vehicle commitment. Interacts with the CO2-based deductibility and VAA in [[car-and-mobility]] and [[benefits-in-kind-vaa]].\n\n## See also\n\n[[car-and-mobility]] \u00b7 [[benefits-in-kind-vaa]] \u00b7 [[corporate-tax-basics]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "ict-equipment": "\n# ICT equipment (iPad, tablet, laptop)\n\nBought through the company, an iPad/tablet (and similar ICT) is fully deductible for income tax, with a small benefit-in-kind for assumed private use and a capped VAT deduction.\n\n## The rule (verify_live)\n\n- **Income-tax deduction: 100%** of the purchase as a professional cost. [astro]\n- **Benefit in kind (Voordeel Alle Aard, VAA):** because private use is assumed, a fixed amount is added to the director's taxable income , for a tablet ~**EUR 36/year**, declared annually. [astro]\n- **VAT: ~75% deductible** (the tax authority assumes partial private use). Claiming 100% is risky , a control can reject the full deduction and lead to corrections or penalties; the 75% rule is the safe, compliant choice. [astro]\n\n> Confirm the current VAA amount and VAT percentage with [FOD Financi\u00ebn](https://financien.belgium.be) before booking.\n\n## Booking\n\nExpense or capitalise per the amount and the firm's policy; book the non-deductible 25% VAT as part of the cost. Record the annual VAA for the director ([[payroll-director]], planned). The 100% income-tax deduction needs no add-back; only the VAA and the VAT cap apply.\n\n## See also\n\n[[restaurant-and-meals]] \u00b7 [[car-and-mobility]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "restaurant-and-meals": "\n# Restaurant and business meal costs\n\nRestaurant and meal costs (meals + drinks served in an eatery, business dinners and lunches, event catering) are deductible only when the meal has a **business character** , it must relate to earning or keeping taxable income, e.g. a meal with a client, prospect, supplier or partner. The type of venue (restaurant vs sandwich shop) does not change the qualification.\n\n## The rule (verify_live)\n\n- **Income-tax deductibility: ~69%.** Even a meal that is 100% business is only ~69% deductible , tax is still paid on the remaining ~31%. [astro]\n- **VAT on restaurant costs is, in principle, NOT deductible** , even with a VAT receipt. [astro]\n- A **lunch during work hours** is deductible only with a clear professional purpose (lunch with a client/supplier/colleague to discuss business). A solo meal is not deductible. [astro]\n- **Proof:** note on the receipt **who** you ate with and **why** (\"lunch with client X re project Y\"). This substantiates the business character for a control. [astro]\n\n> Confirm the current percentage with [FOD Financi\u00ebn](https://financien.belgium.be) before applying to a real booking.\n\n## Booking\n\nBook to the dedicated restaurant-cost account in class 6 (see [[chart-of-accounts-mar]]). The non-deductible fraction is a **tax add-back** in the corporate-tax computation ([[year-end]], planned), not a bookkeeping exclusion , book the full cost. The non-deductible VAT is part of the cost.\n\n## See also\n\n[[ict-equipment]] \u00b7 [[car-and-mobility]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "kilometer-allowance": "\n# Kilometer allowance (kilometervergoeding)\n\nWhen the director uses their **own (private) car** for a professional trip, the company can pay a **forfait per kilometer** , tax-free and RSZ-free within the ceiling. This is the **private-car** case; a company car is handled via [[car-and-mobility]] + [[benefits-in-kind-vaa|VAA]] instead.\n\n## The rule (verify_live)\n\n- **Per-km rate (last-known):** ~**EUR 0.4326/km** (1 Jan-31 Mar 2026), ~**EUR 0.4327/km** (1 Apr-30 Jun 2026); the **annual** forfait (1 Jul 2025-30 Jun 2026) is ~**EUR 0.4449/km**. [search]\n- **Tax- and RSZ-free** as long as the maximum is not exceeded. [search]\n- For a director (bedrijfsleider), the amount must be reported on the **fiscal fiche 281.20**. [search]\n\n> The rate is **indexed quarterly** (and a yearly variant exists). **Confirm the current per-km rate with [FOD Financi\u00ebn](https://financien.belgium.be)** before reimbursing; over the ceiling becomes taxable.\n\n## Why it matters\n\nA simple, untaxed reimbursement for the common case of a director driving their private car for the BV , the agent applies the rate for the relevant quarter and logs the trips. Pairs with [[per-diem-domestic-travel]] (meals) for business travel.\n\n## See also\n\n[[car-and-mobility]] \u00b7 [[per-diem-domestic-travel]] \u00b7 [[home-office]]\n\nSource: linkup search synthesis; verify the current rate against FOD Financi\u00ebn.", "clothing": "\n# Work clothing (beroepskledij)\n\nOnly **specific professional clothing** is deductible , the tax authority is strict here, so this is a frequent rejection.\n\n## The rule\n\n- **Specific professional clothing: 100% deductible.** Items specific to the profession, **barely wearable privately**, or **required by regulation** , safety clothing, overalls, work shoes, helmets, aprons. [search]\n- **Ordinary clothing: not deductible.** Suits, normal shoes, anything also worn privately , rejected, even with a company logo if it has no genuine professional character. [search]\n- **VAT** on specific professional clothing is deductible with a valid invoice in the company's name ([[vat-deduction-conditions]]). [search]\n- **Logo clothing** may sometimes count as a publicity cost (cf. [[sponsoring]]); **non-specific** clothing bought via the company can be taxed as a **benefit in kind** ([[benefits-in-kind-vaa]]) on the recipient. [search]\n\n## Booking\n\nBook specific work clothing to a class-6 cost account; flag ordinary clothing as non-deductible in [[expense-categorization]] (a disallowed expense, like [[fines]]).\n\n## See also\n\n[[vat-deduction-conditions]] \u00b7 [[expense-categorization]] \u00b7 [[benefits-in-kind-vaa]]\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn.", "training-costs": "\n# Training costs and the KMO-portefeuille\n\nProfessional training that improves the business is a deductible cost; on top of that, a company with a Flemish establishment can recover part of it through the **KMO-portefeuille**, a Flemish-government subsidy for SME training and advice.\n\n## The rule (verify_live)\n\n- **Deductibility:** genuinely professional training is a deductible cost (class-6, see [[chart-of-accounts-mar]]); apply the [[expense-categorization|professional-character test]].\n- **KMO-portefeuille subsidy** (Flanders): a small enterprise gets **~30%** back, a medium enterprise **~20%**, each up to **~EUR 7,500/year**. [astro]\n- **Conditions:** an SME/self-employed with an establishment **in Flanders**, using a **recognized provider**, for training that improves business operations. [astro]\n\n> Subsidy rates, caps, and eligibility change. **Confirm at the current KMO-portefeuille source** (Flemish government) before relying on them. The subsidy is regional (Flanders); other regions differ.\n\n## Booking\n\nBook the full training cost as an expense; the subsidy received is income/an offset , do not net it silently. Size eligibility ties to [[company-size-criteria]].\n\n## See also\n\n[[company-size-criteria]] \u00b7 [[expense-categorization]] \u00b7 [[corporate-tax-basics]]\n\nSource: Astro Tax help (collaboration source, distilled).", "international-passport": "\n# International passport\n\nThe cost of an international passport is deductible as a professional cost **when it is needed for genuine business travel** (a business trip, a client visit abroad, an international seminar).\n\n## The rule\n\n- **Work-related:** the travel the passport is for must have a business reason. [astro]\n- **Proof of professional need:** keep evidence (an event invitation, a client-visit record) showing why the passport was required. [astro]\n- **Pay via the professional account** and keep the payment proof (and the municipality's receipt for the application). [astro]\n\nLike other small costs, this leans on the **professional-character test** ([[streaming-subscriptions]], [[reading-glasses]]): the burden is on the taxpayer to show the business need, so documentation matters more than the amount.\n\n## Booking\n\nBook to a class-6 travel/admin cost account (see [[chart-of-accounts-mar]]); attach the payment proof.\n\n## See also\n\n[[reading-glasses]] \u00b7 [[streaming-subscriptions]] \u00b7 [[chart-of-accounts-mar]]\n\nSource: Astro Tax help (collaboration source, distilled).", "ev-charging-reimbursement": "\n# EV home-charging reimbursement\n\nIf the director charges an electric [[car-and-mobility|company car]] at home, the company can reimburse the electricity. There are **two methods**, and the choice affects both administration and amount.\n\n## The rule (verify_live)\n\n- **Actual cost per kWh:** precise reimbursement of the real electricity cost; needs more proof (a calibrated charger/meter and the actual tariff), but can be better when the home electricity price is above the forfait. [astro]\n- **Forfait per kWh:** a fixed rate per kWh, simpler, but it depends on **regional tariffs** and is **updated periodically** (the 2025 forfait varies by region/quarter). [astro]\n\n> The forfait rate changes (regionally, roughly quarterly). **Confirm the current per-kWh forfait** before reimbursing; an over-reimbursement becomes a taxable benefit.\n\n## Why it matters\n\nA practical, recurring calculation for an EV-driving one-person BV. The reimbursement sits alongside the car's [[benefits-in-kind-vaa|VAA]] and its [[car-and-mobility|CO2-based deductibility]] , the agent picks the method and applies the current forfait.\n\n## See also\n\n[[car-and-mobility]] \u00b7 [[benefits-in-kind-vaa]] \u00b7 [[hybrid-car-rules-2026]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "gifts-relatiegeschenk": "\n# Relationship gifts (relatiegeschenken)\n\nBusiness gifts to clients (gift vouchers, bottles, etc.) are partly deductible, with a separate VAT rule. A flexible option is a **gift voucher** (boekenbon, cinema ticket, an online-shop voucher), usable all year, not only at the holidays.\n\n## The rule (verify_live)\n\n- **Income tax: ~50% deductible** as a representation cost. [astro]\n- **VAT: deductible for only one gift per client per calendar year**, and only if the gift is **under ~EUR 50 (excl. VAT)**. Two gifts to the same client -> VAT on only one; ten gifts to ten different clients -> all fine. [astro]\n- **Document the recipient's name** on the purchase document when booking, for a control. [astro]\n\n> Confirm the current EUR 50 cap and the 50% rate with [FOD Financi\u00ebn](https://financien.belgium.be).\n\n## Booking\n\nBook to a class-6 representation account; the non-deductible 50% is a year-end add-back ([[expense-categorization]] flags it). Apply the [[vat-deduction-conditions|VAT-deduction]] one-gift-per-client cap. The 50% logic mirrors [[restaurant-and-meals|representation costs]] and the benefits side of [[sponsoring]].\n\n## See also\n\n[[restaurant-and-meals]] \u00b7 [[sponsoring]] \u00b7 [[vat-deduction-conditions]]\n\nSource: Astro Tax help (collaboration source, distilled).", "year-end-close": "\n# Workflow: year-end close\n\nThe annual routine that turns twelve [[month-end-close|monthly closes]] into the filed annual accounts and tax return. Prepare for review; the operator (and accountant) approve.\n\n## Steps\n\n1. **Final reconciliation** , all twelve months booked and reconciled ([[coda-bank-reconciliation]]); no open items unexplained.\n2. **Closing entries** , post the year-end set ([[closing-entries]]): depreciation, impairments, provisions, cut-off, inventory, accruals.\n3. **Draft the result** , produce the balance sheet + P&L; sanity-check vs prior year.\n4. **Corporate-tax computation** , base = accounting profit + disallowed expenses (verworpen uitgaven) + dividends, minus deductions; apply the rate ([[corporate-tax-basics]]); reconcile against [[advance-payments|advance payments]]; book the tax provision.\n5. **If distributing** , verify the [[distribution-test-advies|net-asset + liquidity tests]] pass **before** any dividend/[[vvpr-bis-dividends|VVPR-bis]].\n6. **Assemble the annual accounts** , the micro/abridged model per [[company-size-criteria|size]]; file in XBRL at the NBB within the deadline ([[annual-accounts-nbb]]).\n7. **File the corporate-tax return** (Biztax) and any related forms; archive everything ([[document-retention]]).\n\n## Gate\n\n- The balance sheet **balances**; the result ties to the P&L.\n- For a payout, the **distribution test passes** , otherwise stop.\n- The **NBB and tax deadlines** are met (verify the current dates).\n- Figures going to the authority are **verified live and operator-approved**, never auto-filed.\n\n## See also\n\n[[closing-entries]] \u00b7 [[annual-accounts-nbb]] \u00b7 [[corporate-tax-basics]] \u00b7 [[month-end-close]]", "supplier-pattern-library": "\n# Supplier pattern library (transaction classification)\n\nDefault classifications for recurring Belgian suppliers/transaction types , a fast path for [[booking-a-purchase-invoice]] and [[expense-categorization]]. **Defaults, not rulings:** apply the linked rule page for the actual deductible % and VAT, follow the [[classification-protocol]] when a line doesn't match, and never auto-maximise.\n\n| Supplier / type | Default account | VAT | Deductibility |\n|---|---|---|---|\n| Fuel stations (Total, Q8, Esso) | car costs (61) | partial (car cap); only on a **fuel-card invoice**, not a till receipt | CO2-based ([[car-and-mobility]]) |\n| EV charging | car costs (61) | partial | [[ev-charging-reimbursement]] |\n| Telecom (Proximus, Orange, Telenet) | services (61) | deductible (business share) | business use; VAA if private ([[benefits-in-kind-vaa]]) |\n| Restaurants / Deliveroo / Uber Eats | restaurant cost (61) | **not deductible** | ~69% ([[restaurant-and-meals]]) |\n| SaaS / cloud (Google, Microsoft, Adobe, AWS) | services (61) | **reverse charge** if EU non-BE ([[intracommunity-and-medecontractant]]) | deductible |\n| Office supplies / ICT (Coolblue, Amazon, Bol) | supplies (61) / asset (2) | deductible; ICT VAT capped ~75% ([[ict-equipment]]) | 100% (ICT) |\n| Rail / parking (NMBS, parkings) | travel (61) | usually **no recovery** (no valid invoice, [[vat-deduction-conditions]]) | cost deductible |\n| Accountant / lawyer | fees (61) | deductible | deductible |\n| Insurance | (61) | **exempt** (no VAT) | deductible |\n| Bank charges (KBC, BNP, Belfius) | financial charges (65) | no VAT | deductible |\n| Social secretariat / HR | fees (61) | deductible | deductible |\n\n## See also\n\n[[booking-a-purchase-invoice]] \u00b7 [[expense-categorization]] \u00b7 [[classification-protocol]]\n\nNote: an original classification list (clean-room), pointing at the rule pages for the numbers. Inspired by OpenAccountants' supplier patterns; no AGPL content copied.", "booking-a-purchase-invoice": "\n# Workflow: booking a purchase invoice\n\nThe most frequent agent action. Each purchase invoice is captured, classified, and booked , with the VAT split and the deductibility flagged, never assumed.\n\n## Steps\n\n1. **Capture + validate.** Read supplier, date, invoice number, net/VAT/gross. Check the **supplier VAT number** and that the company's own details are correct. Reject duplicates.\n2. **Determine the cost nature** and the right class-6 account ([[chart-of-accounts-mar]]).\n3. **Classify deductibility** , apply the relevant rule page: [[restaurant-and-meals]] (~69%, VAT not deductible), [[car-and-mobility]], [[ict-equipment]] (VAT ~75%), [[sponsoring]], etc. Flag the non-deductible fraction for the year-end add-back; **do not** exclude it from the booking.\n4. **Split VAT.** Book deductible input VAT to **411**; book non-deductible VAT as part of the cost. Watch caps (car, ICT) and restaurant (no VAT deduction).\n5. **Reverse charge?** If the invoice is medecontractant/intracommunity ([[intracommunity-and-medecontractant]]), there is no supplier VAT , self-account in the VAT return instead.\n6. **Book the counterpart** to the supplier account (44) and **match the payment** from the bank ([[month-end-close]] / CODA).\n7. **Archive** the document per [[document-retention]] (10 years).\n\n## Gate\n\n- Debit = credit; VAT correctly split; deductibility category recorded; supplier VAT number valid.\n- **Anything ambiguous (deductibility, reverse charge) is flagged for review, not guessed.**\n\n## See also\n\n[[month-end-close]] \u00b7 [[chart-of-accounts-mar]] \u00b7 [[intracommunity-and-medecontractant]]", "month-end-close": "\n# Workflow: month-end close\n\nThe recurring routine that keeps the books current, so the [[vat-period-prep|VAT return]] and year-end are low-effort. Run it monthly.\n\n## Steps\n\n1. **Collect** all documents for the month: purchase invoices, sales invoices, bank statements, receipts.\n2. **Book purchases** ([[booking-a-purchase-invoice]]) and **sales** (with the correct VAT treatment, incl. [[intracommunity-and-medecontractant|reverse charge]]).\n3. **Reconcile the bank** , import the statement (CODA) and match every line to an invoice or entry; investigate unmatched items. (See planned `coda-bank-reconciliation`.)\n4. **Check the VAT accounts** (411 input / 451 output, see [[chart-of-accounts-mar]]) , do they reflect the month's invoices?\n5. **Review open items** , aged debtors (40) and creditors (44); flag overdue.\n6. **Sanity pass** , unusual amounts, missing supplier VAT numbers, costs with uncertain [[restaurant-and-meals|deductibility]].\n7. **Summarise** , a short month report (revenue, costs, cash, flags) for the operator.\n\n## Gate\n\n- **The bank reconciles** and there are **no unbooked documents** for the month.\n- VAT accounts tie to the booked invoices.\n- Any anomaly is surfaced in the summary, not silently closed.\n\n## See also\n\n[[booking-a-purchase-invoice]] \u00b7 [[vat-period-prep]] \u00b7 [[chart-of-accounts-mar]]", "vat-period-prep": "\n# Workflow: prepare a periodic VAT return for review\n\nThe agent **prepares** the [[periodic-vat-return-intervat|periodic VAT return]] and presents it for approval. It does **not** file , a real submission is human-approved and verified against FOD (prepare-never-send).\n\n## Steps\n\n1. **Scope the period.** Determine the period (quarter/month) and its filing deadline , **verify the current deadline live** ([[periodic-vat-return-intervat]] is `verify_live`).\n2. **Reconcile first.** Ensure all sales and purchase invoices for the period are booked and the bank is reconciled (the [[chart-of-accounts-mar|VAT accounts]] 411/451 must be complete). Flag anything unbooked.\n3. **Compile the figures.** Sum output VAT (451) and input VAT (411) by rate; compute the net to pay or reclaim. Map to the Intervat return grid boxes.\n4. **Sanity checks.** Compare to the prior period; flag big swings, missing-VAT-number invoices, reverse-charge (medecontractant) entries, and intra-community transactions (these also feed the EC sales list).\n5. **Verify rates/rules** against [[vat-rates-and-regimes]] , and re-confirm any changeable figure with [FOD Financi\u00ebn](https://financien.belgium.be).\n6. **Present for approval.** Produce a short summary (period, boxes, net, flags) for the operator. Generate the Intervat XML only after approval.\n7. **Record.** Log what was prepared; route the artifact to its store. Any recurring issue -> update the relevant KB page.\n\n## Guardrails\n\n- **Never auto-file.** Outbound to the tax authority needs explicit approval and a live verification against FOD.\n- If figures don't reconcile, **stop and escalate** , do not file an unbalanced return.\n\n## See also\n\n[[periodic-vat-return-intervat]] \u00b7 [[vat-rates-and-regimes]] \u00b7 [[chart-of-accounts-mar]]", "coda-bank-reconciliation": "\n# Workflow: CODA bank reconciliation\n\n**CODA** (gecodeerd dagafschrift) is the Belgian standardized electronic bank-statement format. Banks deliver CODA files; the agent imports them and reconciles every line so the books match reality , the backbone of [[month-end-close]].\n\n## Steps\n\n1. **Import the CODA** file into the books for the period.\n2. **Auto-match** each transaction:\n   - **Customer payment** -> clear the open debtor (40), matched by amount and the **structured communication (OGM/mededeling)** or invoice reference.\n   - **Supplier payment** -> clear the open creditor (44), link to the [[booking-a-purchase-invoice|booked invoice]].\n3. **Book the non-invoice lines** to the right account ([[chart-of-accounts-mar]]): bank charges (65), VAT payments to the authority (451), taxes, salary/social, transfers.\n4. **Flag unmatched / unknown** transactions for review rather than forcing them.\n5. **Tie the balance** , the ledger bank account (550) must equal the statement's closing balance.\n\n## Gate\n\n- **Every line is matched or booked**, and the **ledger bank balance equals the real statement balance**.\n- Unrecognised transactions are surfaced, not parked in a suspense account silently.\n\n## See also\n\n[[month-end-close]] \u00b7 [[booking-a-purchase-invoice]] \u00b7 [[chart-of-accounts-mar]]", "intake": "\n# Intake (scope + onboarding)\n\nRuns **before** any classification. It scopes the work, confirms the operator's situation, and decides whether the case is in scope or should go to a human accountant. Pairs with the [[classification-protocol]].\n\n## Open with the boundary\n\nState it first: *\"I prepare your accounting and tax working papers for your accountant to review , I never file anything. A few questions so I can help.\"* (the prepare-never-file rule.)\n\n## Scope questions (ask as one batch)\n\n1. Belgian resident / established for the full year?\n2. Business form , [[eenmanszaak-vs-vennootschap|eenmanszaak or a BV]]?\n3. VAT regime , standard, the small-enterprise exemption ([[vat-rates-and-regimes]]), or none?\n4. Employees? How many?\n5. Sector / activity?\n6. Bookkeeping basis , accrual (a BV must) or simplified?\n7. What's needed , month-end, VAT return, payout planning, year-end + filing, setup?\n\n## Refusal catalogue (hand off to a human accountant)\n\nStop and route to a professional when the case is out of the agent's scope:\n\n- **Groups / consolidation / subsidiaries** , beyond a single-person BV.\n- **Non-resident** or part-year situations.\n- **Special VAT regimes** , margin scheme, partial exemption, VAT unit (only the standard regime is in scope).\n- **Pending / low-confidence rules** the operator wants to act on now , e.g. the not-yet-voted [[liquidation-reserve]] reform or [[capital-gains-tax-on-shares]] (flag, don't decide).\n- Anything that needs **professional sign-off beyond a review**, or where source documents are missing.\n\n## Then\n\nAccept whatever documents the operator has (bank statements, sales/purchase invoices, prior returns , PDF/CSV/image). Infer the rest, route to the right workflow ([[month-end-close]], [[vat-period-prep]], [[year-end-close]]), and run the [[classification-protocol]].\n\n## See also\n\n[[classification-protocol]] \u00b7 [[month-end-close]] \u00b7 [[year-end-close]]\n\nNote: onboarding/refusal pattern re-authored (clean-room), inspired by OpenAccountants' intake; see docs/architecture/accounting-kb-vs-openaccountants.md.", "classification-protocol": "\n# Classification protocol\n\nThe behavioural contract the agent follows in every workflow ([[booking-a-purchase-invoice]], [[expense-categorization]], [[vat-period-prep]], [[year-end-close]]). It governs **what to do when the documents don't fully answer the question** , the difference between a useful working paper and a guess.\n\n## Conservative defaults\n\nWhen uncertain about any treatment, choose the option that **costs more or imposes stricter compliance**, never less. A reviewer can relax an over-conservative position; they cannot easily recover from an aggressive one that was already filed. (Aligns with the prepare-never-file rule.)\n\n## One of three outcomes per item\n\nEvery transaction or data point gets exactly one:\n\n- **Classified** , the documents carry enough to apply the rule. No flag.\n- **Assumed** , a fact is missing, so a conservative default is applied **and disclosed**: state the exact assumption and its cash/compliance impact.\n- **Needs input** , cannot proceed without the operator. Ask **one targeted question**, then classify.\n\n## Execution rules\n\n- **Cite the rule/source** for every rate, threshold, or code (and apply `verify_live` , fetch the current value for any changeable figure).\n- **Never invent a code or a rate.** Use only accounts from [[pcmn-account-codes]] and figures from a cited source.\n- **Group related assumptions** (\"5 entertainment items blocked, total EUR 340\") rather than flagging each.\n- **Don't re-ask** what the documents already answer. Process all data before producing output.\n- When several domains apply (a payroll item that also hits income tax), address both.\n\n## Output discipline\n\nProduce, as relevant: a **working paper** (item-by-item classification with account/box assignments), a **reviewer brief** (every position cited, every assumption disclosed, flags ranked by cash impact), and an **action list** (what to pay/file, when). The operator/accountant signs off; the agent never files.\n\n## See also\n\n[[booking-a-purchase-invoice]] \u00b7 [[expense-categorization]] \u00b7 [[vat-period-prep]]\n\nNote: methodology re-authored (clean-room), inspired by OpenAccountants' \"classification contract\"; see docs/architecture/accounting-kb-vs-openaccountants.md.", "expense-categorization": "\n# Workflow: expense categorization\n\nThe judgment step inside [[booking-a-purchase-invoice]]: given a cost, decide the account, the income-tax deductibility, and the VAT treatment , applying the rule pages rather than guessing.\n\n## Steps\n\n1. **Identify the nature** of the cost and map it to a class-6 account ([[chart-of-accounts-mar]]).\n2. **Apply the income-tax deductibility rule** from the matching page:\n   - [[restaurant-and-meals]] (~69%), [[car-and-mobility]] (CO2-based), [[ict-equipment]] (100%), [[sponsoring]] (100%/50%), [[streaming-subscriptions]] / [[reading-glasses]] / [[international-passport]] (professional-character test).\n   - Record the **non-deductible fraction** for the year-end add-back; book the full cost.\n3. **Set the VAT treatment** per [[vat-deduction-conditions]] (professional use, correct invoice, right to deduct) and any cap (restaurant none, car/ICT capped).\n4. **Flag a benefit in kind** ([[benefits-in-kind-vaa]]) where there is private use (car, phone, ICT).\n5. **Flag the uncertain ones** (dual-use, weak professional link) for operator review.\n\n## Gate\n\n- Each expense has: an account, an income-tax deductibility %, and a VAT treatment.\n- **Borderline deductibility is flagged, never silently maximised.**\n\n## See also\n\n[[booking-a-purchase-invoice]] \u00b7 [[vat-deduction-conditions]] \u00b7 [[benefits-in-kind-vaa]]", "periodic-vat-return-intervat": "\n# Periodic VAT return (Intervat)\n\nA Belgian VAT-registered company files a **periodic VAT return** (monthly or quarterly) via **Intervat** (the FOD Financi\u00ebn platform), reporting output VAT, input VAT, and the net to pay or reclaim.\n\n## Key facts (verify_live)\n\n- **Frequency:** quarterly is common for a small BV; monthly above a turnover threshold or by option. Confirm the current threshold/deadlines live.\n- **Deadlines (verify_live):** the return + payment are due in the month following the period. Since **2025**, quarterly filers have until the **25th**; monthly filers ~the **20th**. (A 2025 reform also replaced the VAT current account with a **provisierekening** and changed refunds , see [[vat-return-grilles]].) **Confirm the exact current dates with [FOD Financi\u00ebn](https://financien.belgium.be)**, do not rely on a remembered date.\n- **Channel:** Intervat XML upload, or the **Intervat API** (opened to companies; request access via MyMinfin / FOD Financi\u00ebn).\n- Related periodic obligations: the **EC sales list** (intracommunautaire opgave) and the **annual client listing** (klantenlisting).\n\n## How the agent prepares it\n\nPer the [[vat-period-prep]] workflow: compile the figures from the VAT accounts (411/451, see [[chart-of-accounts-mar]]), validate, and present for approval. **Never auto-file** , a real submission is verified against FOD and human-approved.\n\n## See also\n\n[[vat-period-prep]] \u00b7 [[vat-rates-and-regimes]]", "vat-return-grilles": "\n# VAT return grilles (the boxes)\n\nThe structured boxes (roosters/grilles) of the Belgian periodic VAT return. The [[vat-period-prep]] workflow maps the books to these; [[ec-sales-list]] and the [[annual-client-listing]] are filed separately.\n\n## Outgoing operations (uitgaande handelingen)\n\n| Box | Captures |\n|---|---|\n| 00 | Sales at 0% / non-taxable |\n| 01 | Sales base at 6% |\n| 02 | Sales base at 12% |\n| 03 | Sales base at 21% |\n| 44 | Intra-EU services provided (base) |\n| 45 | Operations with reverse charge to a Belgian co-contractor (base) |\n| 46 | Intra-EU supplies of goods + triangular (base, 0%) |\n| 47 | Other exempt operations / co-contractor |\n| 48 | Credit notes issued (re intra-EU) |\n| 49 | Other credit notes / corrections |\n\n## Incoming operations (inkomende handelingen)\n\n| Box | Captures |\n|---|---|\n| 81 | Purchases of goods, raw materials, consumables (base) |\n| 82 | Purchases of services and diverse goods (base) |\n| 83 | Purchases of capital goods / investments (base) |\n| 84 / 85 | Credit notes received / corrections |\n| 86 | Intra-EU acquisitions (base) |\n| 87 | Other incoming (imports, co-contractor) (base) |\n\n## VAT amounts + balance\n\n| Box | Captures |\n|---|---|\n| 54 | Output VAT due on boxes 01/02/03 |\n| 55 | Output VAT on intra-EU acquisitions / reverse charge |\n| 56 | Output VAT on co-contractor operations |\n| 59 | **Deductible** input VAT |\n| 71 | Net **to pay** to the State |\n| 72 | Net **refundable** by the State |\n\n> **verify_live + 2025 changes:** from 2025, the VAT current account became a **provisierekening**, refund rules (box 72) changed, and the **quarterly deadline moved to the 25th** of the month after the period (monthly filers keep ~the 20th). **Confirm the current boxes, rates, and deadlines with [FOD Financi\u00ebn](https://financien.belgium.be)** before filing.\n\n## See also\n\n[[vat-period-prep]] \u00b7 [[periodic-vat-return-intervat]] \u00b7 [[intracommunity-and-medecontractant]]\n\nSource: FOD Financi\u00ebn periodic VAT return (Intervat); box meanings distilled. Verify against the current form.", "intracommunity-and-medecontractant": "\n# Reverse charge (medecontractant + intracommunity)\n\nIn defined B2B cases the supplier charges **0% VAT** and the **customer self-accounts** for the VAT (verlegging van heffing). The invoice must carry the correct legal mention , this is a frequent source of errors.\n\n## Domestic: medecontractant (mainly construction) [search]\n\n- Applies to **work on immovable property** used (partly) professionally, **between two Belgian VAT payers** who file periodic returns.\n- The supplier invoices **0% VAT**; the customer declares the VAT in their own return (grids 81/82/83/87/88 depending on the case).\n- **Mandatory mention since 1 January 2023:** *\"Verlegging van heffing , Belasting te voldoen door de medecontractant, art. 20 KB nr. 1\"* (replaces the old \"btw verlegd\").\n- Does **not** apply to VAT-exempt customers or private individuals.\n\n## Cross-border: intracommunity [search]\n\n- **Services to a VAT-payer in another EU country:** VAT shifts to the customer. Mention *\"Btw verlegd: Art. 21 par. 2 van het Belgische btw-wetboek\"*.\n- **Goods to a VAT-payer in another EU country:** intracommunity supply, mention *\"Btw verlegd: Art. 39bis , intracommunautaire levering\"*.\n- 0% on the invoice; these feed the **EC sales list** (intracommunautaire opgave).\n\n> Verify the exact article references and grid numbers with [FOD Financi\u00ebn](https://financien.belgium.be); always check the customer's VAT number is valid (VIES) before applying 0%.\n\n## See also\n\n[[vat-rates-and-regimes]] \u00b7 [[periodic-vat-return-intervat]] \u00b7 [[vat-period-prep]]\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn.", "vat-deduction-conditions": "\n# When is VAT deductible (the conditions)\n\nInput VAT on a purchase is only recoverable if the basic conditions are met. Getting this right is the heart of [[booking-a-purchase-invoice|booking a purchase invoice]].\n\n## The conditions\n\n1. **Professional purchase.** Only VAT on purchases for the business is deductible. A 100% private purchase gives no deduction; a **mixed-use** item (phone, laptop, [[car-and-mobility|car]], [[ict-equipment|tablet]]) is only **partly** deductible. [astro]\n2. **A correct invoice.** Without one, there is no right to deduct. It must carry: the company name, legal form, enterprise number, address, a description of the goods/services, and the correct VAT rate. [astro]\n   - **No valid invoice -> no VAT recovery**, even if the cost itself is deductible: a fuel-station till receipt, a parking-machine ticket, an NMBS train ticket. A **fuel card billed on a proper invoice** does give (partial) VAT recovery. [astro]\n3. **The activity gives a right to deduction.** The purchase must serve taxed output activity; a VAT-**exempt** activity under art. 44 (doctors, schools, some others) gives **no** input-VAT deduction.\n\n> Caps and exclusions still apply on top (e.g. [[restaurant-and-meals|restaurant VAT not deductible]], car/ICT capped). Confirm specifics with [FOD Financi\u00ebn](https://financien.belgium.be).\n\n## See also\n\n[[booking-a-purchase-invoice]] \u00b7 [[vat-rates-and-regimes]] \u00b7 [[ict-equipment]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "vat-rates-and-regimes": "\n# Belgian VAT rates and regimes\n\n> **verify_live:** the rates and thresholds below are last-known values. **Confirm the current figures with [FOD Financi\u00ebn](https://financien.belgium.be)** before applying them to a real invoice, booking, or return (see the external-source rules in [`AGENTS.md`](../../AGENTS.md)).\n\n## Rates (last-known)\n\n- **21%** , standard rate, most services (a management/consultancy BV's default).\n- **12%** , certain supplies (e.g. some food service / specific goods).\n- **6%** , reduced (e.g. certain goods, specific renovation works).\n- **0% / exempt** , exports, certain intra-community supplies, and exempt activities (note: exempt is not the same as 0% , no input-VAT deduction).\n\n## Regimes worth knowing\n\n- **Kleine onderneming (small-enterprise exemption):** below an annual turnover threshold, a business can opt out of charging VAT (and cannot deduct input VAT). Confirm the current threshold live.\n- **Intracommunautair / medecontractant (reverse charge):** VAT shifts to the customer in defined B2B/cross-border cases; the invoice carries the legal mention and 0% with a reason code.\n\n## Booking\n\nVAT recoverable -> account 411; VAT payable -> account 451 (see [[chart-of-accounts-mar]]). The net position feeds the [[periodic-vat-return-intervat|periodic VAT return]] via the [[vat-period-prep]] workflow.\n\n## See also\n\n[[periodic-vat-return-intervat]] \u00b7 [[vat-period-prep]] \u00b7 [[chart-of-accounts-mar]]", "ec-sales-list": "\n# EC sales list (intracommunautaire opgave)\n\nThe periodic listing of **intracommunity transactions** with VAT-payers in other EU countries , the cross-border counterpart of the domestic [[annual-client-listing]]. Filed via **Intervat**.\n\n## The rule (verify_live)\n\n- **Deadline: the 20th** of the month following the period (quarter or month). [fod]\n- **Frequency follows the VAT return:** quarterly filers may file quarterly, **but must switch to monthly** if exempt IC supplies of goods + triangular sales exceed **EUR 50,000** in the current or any of the previous four quarters. [fod]\n- **What it reports:** IC supplies of goods (code **L**), triangular transactions (code **T**), and services taxed where the customer is established (code **S**). [fod]\n- **Electronic** via Intervat for periodic-return filers. [fod]\n\n> Confirm the current threshold, codes, and deadline with [FOD Financi\u00ebn](https://financien.belgium.be).\n\n## Why it matters\n\nDriven by the [[intracommunity-and-medecontractant|reverse-charge]] sales the company books , the agent compiles it from the same 0%-VAT cross-border invoices, alongside the [[periodic-vat-return-intervat|VAT return]].\n\n## See also\n\n[[intracommunity-and-medecontractant]] \u00b7 [[annual-client-listing]] \u00b7 [[periodic-vat-return-intervat]]\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn / Intervat.", "peppol-e-invoicing": "\n# Peppol e-invoicing (mandatory B2B from 2026)\n\nFrom **1 January 2026**, structured electronic invoicing via the **Peppol** network is mandatory for **B2B invoices between Belgian VAT payers**. The Royal Decree of 18 June 2025 made it definitive.\n\n## The rule (verify_live)\n\n- **Scope:** all Belgian VAT payers, **regardless of size or sector** , including small/exempt businesses under the EUR 25,000 franchise. [search]\n- **Format:** structured **Peppol BIS 3.0** (UBL-based), sent and received over the Peppol network. **PDF and paper are no longer valid B2B invoices.** Credit notes follow the same rules. [search]\n- **Out of scope:** B2C invoices. **B2G** has been mandatory since March 2024. [search]\n- **Penalties:** non-compliance can be fined (reported up to ~EUR 5,000). [search]\n\n> Confirm the current rules, any phase-in, and penalty amounts with [FOD Financi\u00ebn](https://financien.belgium.be).\n\n## Practice\n\nThe business needs a Peppol-capable channel (an access point) to send and receive. The access point routes invoices and maps the accounting system's invoice data to the structured format , so the agent's job is to produce clean, complete invoice data (parties, VAT treatment, lines) and confirm delivery, not to hand-build UBL.\n\nReverse-charge and intracommunity invoices ([[intracommunity-and-medecontractant]]) still need their legal mentions inside the structured invoice.\n\n## See also\n\n[[intracommunity-and-medecontractant]] \u00b7 [[periodic-vat-return-intervat]] \u00b7 [[vat-rates-and-regimes]]\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn.", "annual-client-listing": "\n# Annual client listing (klantenlisting)\n\nA yearly VAT obligation: a list of the **Belgian VAT-registered customers** to whom the company supplied goods/services in the previous calendar year **for more than EUR 250 (excl. VAT)**, with the annual turnover per customer.\n\n## The rule (verify_live)\n\n- **Deadline: 31 March** of the following year, via **Intervat**. [fod]\n- **Threshold: EUR 250** (excl. VAT) of annual turnover per Belgian-VAT customer , below that, the customer is not listed. [fod]\n- **Nil listing** if there are no such customers (e.g. all customers are foreign or each under EUR 250). [fod]\n- **Franchise (small enterprise):** a business under the [[vat-rates-and-regimes|exemption regime]] reports its **total turnover** via the listing. [fod]\n- **Mixed/partial taxpayers** file the listing but exclude operations exempt under art. 44 of the VAT code. [fod]\n- **Ceasing activity:** file within **3 months** of losing VAT-payer status. [fod]\n\n> Confirm the current threshold and deadline with [FOD Financi\u00ebn](https://financien.belgium.be).\n\n## Why it matters\n\nA fixed annual deadline the agent prepares from the year's sales ledger , distinct from the cross-border [[ec-sales-list]]. Runs alongside the [[periodic-vat-return-intervat|periodic VAT return]].\n\n## See also\n\n[[ec-sales-list]] \u00b7 [[periodic-vat-return-intervat]] \u00b7 [[vat-period-prep]]\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn / Intervat.", "capital-gains-tax-on-shares": "\n# Capital gains tax on shares (solidarity contribution)\n\nA new **solidarity contribution (~10%)** on **future realized capital gains on financial assets** (shares, etc.). It is a personal-level tax that matters when a director sells a participation. The treatment splits by the size of the holding.\n\n## The rule (verify_live)\n\n- **Small participation (< 20%):** the gain is taxed at the **~10%** solidarity contribution. [astro]\n- **Large participation (>= 20%):** a graduated regime , **up to EUR 1 million of gain is fully exempt**, then a low rate kicks in (e.g. ~1.25% on the EUR 1-2.5 million band), rising in higher bands. [astro]\n\n> **confidence: low + verify_live.** This is a new measure and the thresholds/rates/bands are evolving. **Confirm the current rules with [FOD Financi\u00ebn](https://financien.belgium.be) or the accountant** before any share sale , do not act on these figures alone.\n\n## Why it matters\n\nIt changes the calculus on selling a (management) company or a participation, alongside the [[vvpr-bis-dividends|dividend]] and [[liquidation-reserve|liquidation-reserve]] routes for getting value out of a BV , so it belongs in the same payout/exit planning the agent supports.\n\n## See also\n\n[[vvpr-bis-dividends]] \u00b7 [[liquidation-reserve]] \u00b7 [[corporate-tax-basics]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn. New measure, verify.", "director-loan-rekening-courant": "\n# Director loan and current account (rekening-courant)\n\nA director can take money out of the company as a loan, either through the **current account (rekening-courant, R/C)** or a **fixed-term loan**. The R/C tracks the running balance of what the director and the company owe each other.\n\n## The rule (verify_live)\n\n- **Positive R/C:** the company owes the director (the director put money in). [astro]\n- **Negative / debit R/C:** the director owes the company , this is treated as a loan and **carries interest**. [astro]\n- **The interest rate on a debit R/C is set yearly** by the tax authority. Recent reference rates: income year 2022 ~**7.14%**, income year 2023 ~**5.43%** , high and volatile. [astro]\n- If the company charges **too little** interest, the shortfall becomes a taxable **benefit in kind** ([[benefits-in-kind-vaa]]) for the director.\n\n> The debit-R/C interest rate changes every year. **Confirm the current rate with [FOD Financi\u00ebn](https://financien.belgium.be)** before booking interest.\n\n## Why it matters\n\nA debit R/C is a common, easily-overlooked exposure for a one-person BV: drawing cash without booking the (now high) interest creates a VAA and a tax cost. The agent should track the R/C balance and apply the current rate , part of [[director-remuneration|payout planning]].\n\n## See also\n\n[[benefits-in-kind-vaa]] \u00b7 [[director-remuneration]] \u00b7 [[corporate-tax-basics]]\n\nSource: Astro Tax help (collaboration source, distilled), FOD Financi\u00ebn.", "corporate-tax-basics": "\n# Corporate tax basics (vennootschapsbelasting)\n\nA BV pays corporate tax on its taxable profit. The taxable base starts from the **accounting profit** and is adjusted (the *fiscale bewerkingen*): increase in reserves + **disallowed expenses** (*verworpen uitgaven*, e.g. the non-deductible fraction of [[restaurant-and-meals|meals]] or [[car-and-mobility|car costs]]) + distributed dividends, then minus the deductions.\n\n## Rates (verify_live)\n\n- **Standard rate: 25%.** [search]\n- **Reduced rate: 20% on the first EUR 100,000** of taxable profit, **for a small company** ([[company-size-criteria]]) meeting conditions. [search]\n\n### Conditions for the 20% rate (verify_live)\n\n- The company is a **small company** (size criteria).\n- **At least one director draws a minimum remuneration of EUR 45,000** (or, if profit is lower, a remuneration at least equal to the profit). The planned rise to EUR 50,000 is **not yet in force for 2026** , confirm before relying on it. [search]\n- Not a **financial company**, and the **majority of shares are held by natural persons** (not a holding-heavy structure). [search]\n\n> Rates, the EUR 100,000 band, and the EUR 45,000 remuneration threshold change. **Confirm the current figures with [FOD Financi\u00ebn](https://financien.belgium.be)** before computing a real assessment.\n\n## Why it matters\n\nThe EUR 45,000 director-remuneration condition ties corporate tax directly to [[social-contributions-self-employed|director pay]] , a core optimization lever for a one-person BV (enough salary to keep the 20% rate, the rest via dividends). Modelling this is a primary job of the accounting agent.\n\n## See also\n\n[[company-size-criteria]] \u00b7 [[social-contributions-self-employed]] \u00b7 [[advance-payments]]\n\nSource: linkup search synthesis; verify against FOD Financi\u00ebn.", "vvpr-bis-dividends": "\n# VVPR-bis (reduced withholding tax on dividends)\n\nVVPR-bis lets a **small company** distribute dividends to natural-person shareholders at a **reduced withholding tax (roerende voorheffing)** instead of the standard 30%. It is the second half of the salary-vs-dividend optimization for a one-person BV (the first half is the [[corporate-tax-
